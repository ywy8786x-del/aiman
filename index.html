<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ أيمن الرفاعي التعليمية</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4bd1;
            --accent: #00cec9;
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface-light: #252540;
            --text: #ffffff;
            --text-secondary: #b0b0c0;
            --danger: #ff6b6b;
            --success: #2ed573;
            --warning: #feca57;
            --radius: 20px;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --glass: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 20% 20%, rgba(108,92,231,0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(0,206,201,0.1) 0%, transparent 50%);
        }
        /* شريط جانبي */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transform: translateX(0);
            transition: var(--transition);
        }
        .sidebar-logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-align: center;
        }
        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: var(--radius);
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            background: transparent;
            border: 1px solid transparent;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(108,92,231,0.4);
        }
        .sidebar-nav a i { font-size: 1.3rem; width: 24px; text-align: center; }
        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: #25D366;
            color: white;
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .whatsapp-btn:hover { background: #20b858; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,211,102,0.4); }
        .whatsapp-btn i { font-size: 1.4rem; }
        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 280px;
            padding: 30px 40px;
            min-height: 100vh;
            transition: var(--transition);
        }
        /* الهيدر */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--surface);
            padding: 20px 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .search-container {
            position: relative;
            flex: 1;
            max-width: 500px;
            margin: 0 30px;
        }
        .search-container input {
            width: 100%;
            padding: 15px 50px 15px 25px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--surface-light);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
        }
        .search-container input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.3);
        }
        .search-container i {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
        }
        /* شبكة الدروس */
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        .lesson-card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .lesson-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
            border-color: var(--primary);
        }
        .lesson-card .thumb {
            height: 180px;
            background: linear-gradient(135deg, #2d3561, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--accent);
        }
        .lesson-card .info {
            padding: 20px;
        }
        .lesson-card .title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .lesson-card .meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .badge-free { background: rgba(46,213,115,0.2); color: var(--success); }
        .badge-locked { background: rgba(255,107,107,0.2); color: var(--danger); }
        /* أزرار عامة */
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 6px 20px rgba(108,92,231,0.5); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        /* مودال */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
        }
        .modal h2 { margin-bottom: 20px; color: var(--accent); }
        .modal input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--surface-light);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            margin: 15px 0;
            font-size: 1rem;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        /* فيديو بلاير */
        .video-player-overlay {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: #000;
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .video-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
        }
        .video-container video {
            width: 100%;
            border-radius: 20px;
            pointer-events: auto;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 8px;
            pointer-events: none;
        }
        /* نماذج الدخول */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }
        .auth-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-box input, .auth-box select {
            width: 100%;
            padding: 14px 20px;
            margin: 12px 0;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--surface-light);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
        }
        .auth-box select { background: var(--surface-light); color: var(--text); }
        .auth-box .btn { width: 100%; margin-top: 20px; }
        .toggle-auth { color: var(--accent); cursor: pointer; margin-top: 15px; text-align: center; }
        .error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 5px; display: none; }
        /* تنسيقات المشرف */
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .admin-tab {
            padding: 10px 20px;
            border-radius: 30px;
            background: var(--surface-light);
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }
        .admin-tab.active { background: var(--primary); color: white; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
        .data-table th, .data-table td { padding: 15px; border-bottom: 1px solid var(--border); text-align: right; }
        .data-table th { background: var(--surface-light); color: var(--accent); }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity:0; } to { transform: translateX(0); opacity:1; } }
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 0; padding: 0; overflow: hidden; }
            .main-content { margin-right: 0; }
            .header { flex-direction: column; gap: 20px; }
            .lessons-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        // ======================= Global State =======================
        let currentUser = null; // { userId, fullName, email, phone, role, ... }
        let allVideos = [];
        let activatedVideoIds = [];

        // ======================= Helper Functions =======================
        function showToast(msg, type='info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = type==='error' ? 'var(--danger)' : type==='success' ? 'var(--success)' : 'var(--primary)';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function getDeviceFingerprint() {
            const data = navigator.userAgent + screen.width + 'x' + screen.height + screen.colorDepth + Intl.DateTimeFormat().resolvedOptions().timeZone;
            return btoa(data).substring(0, 32);
        }

        async function getIPInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                return { ip: data.ip, city: data.city + ', ' + data.country_name };
            } catch(e) { return { ip: 'unknown', city: 'unknown' }; }
        }

        function generateCode(length=8) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for(let i=0; i<length; i++) result += chars.charAt(Math.floor(Math.random()*chars.length));
            return result;

            document.getElementById('loginBox').style.display = type==='login' ? 'block' : 'none';

            document.getElementById('loginError').style.display = 'none';

            const password = document.getElementById('loginPassword').value;

            if(!identifier || !password) {
                errorDiv.textContent = 'الرجاء ملء جميع الحقول';
                errorDiv.style.display = 'block'; return;

            // Admin backdoor
            if(identifier === 'admin12344321@1x' && password === 'admin12344321@1x') {
                const ipInfo = await getIPInfo();
                currentUser = {

                    fullName: 'مدير النظام',

                if(!userDoc) {
                    errorDiv.textContent = 'هذا الحساب غير مسجل في الموقع';

                const userData = userDoc.data();

                // Block check
                if(userData.blocked && userData.blockUntil && userData.blockUntil.toMillis() > Date.now()) {
                    const remaining = Math.ceil((userData.blockUntil.toMillis() - Date.now()) / (1000*60*60*24));

                        blockUntil: firebase.firestore.Timestamp.fromMillis(Date.now() + 7*24*60*60*1000)
                    });
                    errorDiv.textContent = 'تم حظر الحساب 7 أيام بسبب تغيير الجهاز.';
                    errorDiv.style.display = 'block'; return;
                }
                // Update fingerprint and IP
                const ipInfo = await getIPInfo();
                await db.collection('users').doc(userDoc.id).update({
                    deviceFingerprint: currentFingerprint,
                    ip: ipInfo.ip,
                    city: ipInfo.city,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                });
                currentUser = {
                    userId: userDoc.id,
                    ...userData,
                    deviceFingerprint: currentFingerprint,
                };
                localStorage.setItem('eduUser', JSON.stringify(currentUser));
                showApp();
            } catch(e) {
                errorDiv.textContent = 'حدث خطأ: ' + e.message;
                errorDiv.style.display = 'block';
            }
        }

        async function register() {
            const firstName = document.getElementById('regFirstName').value.trim();
            const fatherName = document.getElementById('regFatherName').value.trim();
            const grandName = document.getElementById('regGrandName').value.trim();
            const familyName = document.getElementById('regFamilyName').value.trim();
            const countryCode = document.getElementById('regCountry').value;
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const city = document.getElementById('regCity').value.trim();
            const password = document.getElementById('regPassword').value;
            const errorDiv = document.getElementById('regError');
            errorDiv.style.display = 'none';

            if(!firstName || !fatherName || !grandName || !familyName || !phone || !email || !city || !password) {
                errorDiv.textContent = 'جميع الحقول مطلوبة'; errorDiv.style.display = 'block'; return;
            }
            if(!email.endsWith('@gmail.com')) {
                errorDiv.textContent = 'يجب أن يكون البريد الإلكتروني من Gmail (@gmail.com)'; errorDiv.style.display = 'block'; return;
            }
            const fullPhone = countryCode + phone;
            // Check uniqueness
            const fullName = `${firstName} ${fatherName} ${grandName} ${familyName}`;
            try {
                const emailSnap = await db.collection('users').where('email','==',email).get();
                if(!emailSnap.empty) { errorDiv.textContent = 'البريد الإلكتروني مستخدم مسبقاً'; errorDiv.style.display = 'block'; return; }
                const phoneSnap = await db.collection('users').where('phone','==',fullPhone).get();
                if(!phoneSnap.empty) { errorDiv.textContent = 'رقم الهاتف مستخدم مسبقاً'; errorDiv.style.display = 'block'; return; }
                const nameSnap = await db.collection('users').where('fullName','==',fullName).get();
                if(!nameSnap.empty) { errorDiv.textContent = 'الاسم الرباعي مستخدم مسبقاً'; errorDiv.style.display = 'block'; return; }

                const ipInfo = await getIPInfo();
                const userRef = await db.collection('users').add({
                    firstName, fatherName, grandFatherName, familyName,
                    fullName, email, phone: fullPhone, countryCode,
                    city, password, role: 'user',
                    deviceFingerprint: getDeviceFingerprint(),
                    ip: ipInfo.ip, cityFromIP: ipInfo.city,
                    blocked: false, blockUntil: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('تم إنشاء الحساب بنجاح', 'success');
                toggleAuth('login');
            } catch(e) {
                errorDiv.textContent = 'خطأ: ' + e.message; errorDiv.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('eduUser');
            location.reload();
        }

        // ======================= Show App =======================
        function showApp() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            document.getElementById('userAvatar').textContent = currentUser.firstName.charAt(0);
            document.getElementById('userDisplayName').textContent = `${currentUser.firstName} ${currentUser.fatherName} ${currentUser.grandFatherName}`;
            document.getElementById('userDisplayEmail').textContent = currentUser.email || currentUser.phone;
            if(currentUser.role === 'admin') {
                document.getElementById('adminLink').style.display = 'block';
                document.getElementById('settingsLink').style.display = 'block';
            }
            loadHome();
            setupNav();
            listenVideos();
        }

        // ======================= Navigation =======================
        function setupNav() {
            document.querySelectorAll('.sidebar-nav a').forEach(a => {
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.sidebar-nav a').forEach(l=>l.classList.remove('active'));
                    this.classList.add('active');
                    const page = this.dataset.page;
                    if(page === 'home') loadHome();
                    else if(page === 'my-lessons') loadMyLessons();
                    else if(page === 'admin') loadAdminPanel();
                    else if(page === 'settings') loadSettings();
                });
            });
        }

        function loadHome() {
            document.getElementById('dynamicContent').innerHTML = `
                <h2 style="margin-bottom:30px;">📚 جميع الدروس المنشورة</h2>
                <div class="lessons-grid" id="lessonsContainer"></div>
            `;
            renderLessons();
        }

        async function renderLessons(filter = '') {
            const container = document.getElementById('lessonsContainer');
            if(!container) return;
            container.innerHTML = '';
            let videos = allVideos;
            if(filter) {
                const term = filter.toLowerCase();
                videos = videos.filter(v => v.title.toLowerCase().includes(term) || (v.description && v.description.includes(term)));
            }
            if(videos.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);">لا توجد دروس متاحة حالياً.</p>';
                return;
            }
            videos.forEach(video => {
                const isActivated = activatedVideoIds.includes(video.id);
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `
                    <div class="thumb"><i class="fas fa-play-circle"></i></div>
                    <div class="info">
                        <div class="title">${video.title}</div>
                        <div class="meta">
                            <span>${new Date(video.createdAt?.toDate?.() || Date.now()).toLocaleDateString('ar')}</span>
                            <span class="badge ${isActivated ? 'badge-free' : 'badge-locked'}">${isActivated ? 'مفعل' : 'مقفل'}</span>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => openVideo(video));
                container.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderLessons(e.target.value);
        });

        // ======================= Video Logic =======================
        function openVideo(video) {
            if(activatedVideoIds.includes(video.id)) {
                playVideo(video);
            } else {
                showCodeModal(video);
            }
        }

        function showCodeModal(video) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay active';
            overlay.innerHTML = `
                <div class="modal">
                    <button class="close-modal" onclick="this.parentElement.parentElement.remove()">✖</button>
                    <h2>🔑 أدخل كود التفعيل</h2>
                    <input type="text" id="codeInput" placeholder="الكود">
                    <button class="btn btn-primary" id="submitCode">تفعيل</button>
                    <div id="codeError" class="error-msg"></div>
                </div>
            `;
            document.body.appendChild(overlay);
            const input = overlay.querySelector('#codeInput');
            overlay.querySelector('#submitCode').addEventListener('click', () => verifyCode(video, input.value, overlay));
            input.addEventListener('keypress', (e) => { if(e.key==='Enter') verifyCode(video, input.value, overlay); });
        }

        async function verifyCode(video, code, overlay) {
            const errorDiv = overlay.querySelector('#codeError');
            errorDiv.style.display = 'none';
            if(!code.trim()) { errorDiv.textContent = 'أدخل الكود'; errorDiv.style.display='block'; return; }
            try {
                const codesSnap = await db.collection('videos').doc(video.id).collection('codes').where('code','==',code.trim().toUpperCase()).limit(1).get();
                if(codesSnap.empty) { errorDiv.textContent = 'كود غير صحيح'; errorDiv.style.display='block'; return; }
                const codeDoc = codesSnap.docs[0];
                const codeData = codeDoc.data();
                if(codeData.usedBy && codeData.usedBy !== currentUser.userId) {
                    errorDiv.textContent = 'هذا الكود مستخدم من قبل حساب آخر'; errorDiv.style.display='block'; return;
                }
                if(!codeData.usedBy) {
                    // First use, assign to user
                    await db.collection('videos').doc(video.id).collection('codes').doc(codeDoc.id).update({
                        usedBy: currentUser.userId,
                        usedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    // Add to activations
                    await db.collection('activations').add({
                        userId: currentUser.userId,
                        videoId: video.id,
                        code: code.trim().toUpperCase(),
                        activatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    activatedVideoIds.push(video.id);
                }
                overlay.remove();
                playVideo(video);
            } catch(e) {
                errorDiv.textContent = 'خطأ: ' + e.message; errorDiv.style.display='block';
            }
        }

        function playVideo(video) {
            // Record watch
            db.collection('watchHistory').add({
                userId: currentUser.userId,
                videoId: video.id,
                watchedAt: firebase.firestore.FieldValue.serverTimestamp(),
                ip: currentUser.ip,
                device: getDeviceFingerprint()
            }).catch(()=>{});
            const overlay = document.createElement('div');
            overlay.className = 'video-player-overlay';
            overlay.innerHTML = `
                <button style="position:absolute;top:20px;right:20px;background:var(--danger);color:white;border:none;padding:10px 20px;border-radius:20px;font-size:1rem;cursor:pointer;z-index:3100;" onclick="this.parentElement.remove()">✖ إغلاق</button>
                <div class="video-container">
                    <video controls autoplay controlsList="nodownload" oncontextmenu="return false;" disablePictureInPicture>
                        <source src="${video.storageURL}" type="video/mp4">
                        متصفحك لا يدعم الفيديو.
                    </video>
                    <div class="watermark">© منصة الرفاعي</div>
                </div>
            `;
            document.body.appendChild(overlay);
            // Prevent screenshot shortcuts
            overlay.addEventListener('keydown', (e) => {
                if(e.key === 'PrintScreen' || (e.ctrlKey && e.key === 's')) e.preventDefault();
            });
        }

        // ======================= Firestore Listeners =======================
        function listenVideos() {
            // الاستماع لكل الفيديوهات وتحديثها فورياً للجميع
            db.collection('videos').orderBy('createdAt','desc').onSnapshot(snap => {
                allVideos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderLessons();
            });
            
            // الاستماع لتفعيلات المستخدم الخاص
            if(currentUser.role !== 'admin') {
                db.collection('activations').where('userId','==',currentUser.userId).onSnapshot(snap => {
                    activatedVideoIds = snap.docs.map(d => d.data().videoId);
                    renderLessons();
                });
            } else {
                // الأدمن يرى كل شيء مفعل
                db.collection('videos').onSnapshot(snap => {
                    activatedVideoIds = snap.docs.map(d => d.id);
                    renderLessons();
                });
            }
        }

        function loadMyLessons() {
            document.getElementById('dynamicContent').innerHTML = `
                <h2>📖 دروسي المفعلة (${activatedVideoIds.length})</h2>
                <div class="lessons-grid" id="myLessonsGrid"></div>
            `;
            const grid = document.getElementById('myLessonsGrid');
            const myVideos = allVideos.filter(v => activatedVideoIds.includes(v.id));
            if(myVideos.length ===0) grid.innerHTML = '<p>لم تقم بتفعيل أي درس بعد.</p>';
            else myVideos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `<div class="thumb"><i class="fas fa-play-circle"></i></div><div class="info"><div class="title">${v.title}</div></div>`;
                card.addEventListener('click', ()=> playVideo(v));
                grid.appendChild(card);
            });
        }

        // ======================= Admin Panel =======================
        async function loadAdminPanel() {
            if(currentUser.role !== 'admin') return;
            document.getElementById('dynamicContent').innerHTML = `
                <h2>⚙️ لوحة تحكم الأدمن</h2>
                <div class="admin-tabs">
                    <span class="admin-tab active" data-tab="users">👥 المستخدمون</span>
                    <span class="admin-tab" data-tab="videos">🎥 الدروس</span>
                    <span class="admin-tab" data-tab="blocked">🚫 المحظورون</span>
                </div>
                <div id="adminTabContent"></div>
            `;
            document.querySelectorAll('.admin-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
                    this.classList.add('active');
                    const tabName = this.dataset.tab;
                    if(tabName==='users') loadUsersTab();
                    else if(tabName==='videos') loadVideosTab();
                    else if(tabName==='blocked') loadBlockedTab();
                });
            });
            loadUsersTab();
        }

        async function loadUsersTab() {
            const container = document.getElementById('adminTabContent');
            container.innerHTML = '<p>جاري التحميل...</p>';
            const snap = await db.collection('users').get();
            const users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            let html = `<table class="data-table"><tr><th>الاسم</th><th>الإيميل</th><th>الهاتف</th><th>المدينة</th><th>IP</th><th>كلمة المرور</th><th>إجراءات</th></tr>`;
            users.forEach(u => {
                html += `<tr>
                    <td>${u.fullName}</td><td>${u.email}</td><td>${u.phone}</td><td>${u.cityFromIP || u.city}</td><td>${u.ip}</td>
                    <td>${u.password}</td>
                    <td>
                        <button class="btn btn-danger" onclick="blockUser('${u.id}', 'perm')">حظر دائم</button>
                        <button class="btn btn-outline" onclick="blockUser('${u.id}', '7d')">حظر 7 أيام</button>
                        ${u.blocked ? `<button class="btn btn-primary" onclick="unblockUser('${u.id}')">فك الحظر</button>` : ''}
                    </td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        async function blockUser(userId, duration) {
            let blockUntil = null;
            if(duration === 'perm') blockUntil = firebase.firestore.Timestamp.fromMillis(Date.now() + 100*365*24*60*60*1000);
            else if(duration === '7d') blockUntil = firebase.firestore.Timestamp.fromMillis(Date.now() + 7*24*60*60*1000);
            await db.collection('users').doc(userId).update({ blocked: true, blockUntil });
            showToast('تم حظر المستخدم', 'success');
            loadUsersTab();
        }

        async function unblockUser(userId) {
            await db.collection('users').doc(userId).update({ blocked: false, blockUntil: null });
            showToast('تم فك الحظر', 'success');
            loadUsersTab();
        }

        async function loadBlockedTab() {
            const snap = await db.collection('users').where('blocked','==',true).get();
            const blocked = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            let html = '<table class="data-table"><tr><th>الاسم</th><th>تاريخ انتهاء الحظر</th><th>إجراء</th></tr>';
            blocked.forEach(u => {
                const until = u.blockUntil?.toDate().toLocaleDateString('ar') || 'دائم';
                html += `<tr><td>${u.fullName}</td><td>${until}</td><td><button class="btn btn-primary" onclick="unblockUser('${u.id}')">فك الحظر</button></td></tr>`;
            });
            document.getElementById('adminTabContent').innerHTML = html;
        }

        async function loadVideosTab() {
            const container = document.getElementById('adminTabContent');
            container.innerHTML = `<button class="btn btn-primary" onclick="showUploadModal()"><i class="fas fa-upload"></i> رفع فيديو جديد</button>`;
            const snap = await db.collection('videos').orderBy('createdAt','desc').get();
            allVideos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            let html = '';
            allVideos.forEach(v => {
                html += `<div style="background:var(--surface);border-radius:20px;padding:20px;margin-top:20px;">
                    <h3>${v.title}</h3>
                    <button class="btn btn-outline" onclick="generateCodes('${v.id}')">توليد أكواد</button>
                    <button class="btn btn-outline" onclick="viewWatchers('${v.id}')">المشاهدات</button>
                </div>`;
            });
            container.innerHTML += html;
        }

        function showUploadModal() {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay active';
            overlay.innerHTML = `
                <div class="modal">
                    <button class="close-modal" onclick="this.parentElement.parentElement.remove()">✖</button>
                    <h2>رفع درس جديد</h2>
                    <input type="text" id="videoTitle" placeholder="عنوان الدرس">
                    <input type="file" id="videoFile" accept="video/*">
                    <button class="btn btn-primary" id="uploadBtn">رفع</button>
                    <progress id="uploadProgress" value="0" max="100" style="width:100%;margin-top:10px;"></progress>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('#uploadBtn').addEventListener('click', async () => {
                const title = overlay.querySelector('#videoTitle').value.trim();
                const file = overlay.querySelector('#videoFile').files[0];
                if(!title || !file) { showToast('املأ الحقول', 'error'); return; }
                const storageRef = storage.ref('videos/' + Date.now() + '_' + file.name);
                const task = storageRef.put(file);
                task.on('state_changed', snap => {
                    const progress = (snap.bytesTransferred / snap.totalBytes) * 100;
                    overlay.querySelector('#uploadProgress').value = progress;
                });
                await task;
                const url = await storageRef.getDownloadURL();
                await db.collection('videos').add({
                    title, storageURL: url, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                overlay.remove();
                showToast('تم الرفع', 'success');
                loadVideosTab();
            });
        }

        async function generateCodes(videoId) {
            const num = prompt('كم كود تريد توليده؟');
            if(!num || isNaN(num)) return;
            const batch = db.batch();
            const codesRef = db.collection('videos').doc(videoId).collection('codes');
            for(let i=0; i<parseInt(num); i++) {
                const code = generateCode();
                const docRef = codesRef.doc();
                batch.set(docRef, { code, usedBy: null, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            }
            await batch.commit();
            showToast(`تم توليد ${num} كود`, 'success');
        }

        async function viewWatchers(videoId) {
            const snap = await db.collection('watchHistory').where('videoId','==',videoId).get();
            const watchers = snap.docs.map(d => d.data());
            alert('عدد المشاهدات: ' + watchers.length + '\n' + JSON.stringify(watchers.slice(0,5)));
        }

        function loadSettings() {
            document.getElementById('dynamicContent').innerHTML = `
                <h2>إعدادات الموقع</h2>
                <input type="text" id="whatsappInput" placeholder="رابط الواتساب الجديد">
                <button class="btn btn-primary" onclick="updateWhatsApp()">حفظ</button>
            `;
        }

        async function updateWhatsApp() {
            const link = document.getElementById('whatsappInput').value.trim();
            if(!link) return;
            await db.collection('settings').doc('site').set({ whatsappLink: link }, { merge: true });
            document.getElementById('whatsappLink').href = link;
            showToast('تم التحديث', 'success');
        }

        // ======================= Init =======================
        window.addEventListener('DOMContentLoaded', async () => {
            const saved = localStorage.getItem('eduUser');
            if(saved) {
                currentUser = JSON.parse(saved);
                showApp();
            } else {
                document.getElementById('authPage').style.display = 'flex';
                document.getElementById('appPage').style.display = 'none';
            }
            // Load whatsapp link from settings
            const settingsSnap = await db.collection('settings').doc('site').get();
            if(settingsSnap.exists && settingsSnap.data().whatsappLink) {
                document.getElementById('whatsappLink').href = settingsSnap.data().whatsappLink;
            }
        });

        // Global keyboard enter for forms
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                if(document.getElementById('loginBox').style.display !== 'none') login();
                else if(document.getElementById('registerBox').style.display !== 'none') register();
            }
        });
    </script>
</body>
</html>
