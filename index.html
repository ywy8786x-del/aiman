<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ أيمن الرفاعي التعليمية - الإمبراطورية v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4bd1;
            --accent: #00cec9;
            --bg: #07070c;
            --surface: #111122;
            --surface-light: #1a1a30;
            --text: #ffffff;
            --text-secondary: #a2a2bd;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --radius: 16px;
            --shadow: 0 10px 40px rgba(0,0,0,0.6);
            --border: rgba(255,255,255,0.07);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 5% 5%, rgba(108,92,231,0.12) 0%, transparent 50%),
                              radial-gradient(circle at 95% 95%, rgba(0,206,201,0.08) 0%, transparent 50%);
        }

        input, select, textarea {
            width: 100%; padding: 14px 20px; border-radius: 25px; margin: 8px 0;
            border: 1px solid var(--border); background: var(--surface-light);
            color: white; font-family: 'Tajawal'; font-size: 0.95rem; transition: var(--transition);
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px rgba(0,206,201,0.2); }
        textarea { border-radius: 15px; resize: none; }

        .btn {
            padding: 12px 25px; border-radius: 25px; font-weight: 600; border: none;
            cursor: pointer; transition: var(--transition); font-family: 'Tajawal';
            display: inline-flex; align-items: center; gap: 8px; font-size: 0.95rem; justify-content: center;
        }
        .btn-primary { background: linear-gradient(45deg, var(--primary), var(--accent)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(108,92,231,0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--surface-light); border-color: var(--text-secondary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { box-shadow: 0 5px 15px rgba(255,71,87,0.3); }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; border-radius: 20px; }

        /* ================== الـ Auth ================== */
        .auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card {
            background: rgba(17, 17, 34, 0.85); backdrop-filter: blur(20px);
            padding: 45px 40px; border-radius: 24px; width: 100%; max-width: 480px;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: var(--shadow);
        }
        .auth-card h2 {
            text-align: center; margin-bottom: 10px; font-size: 2rem; font-weight: 900;
            background: linear-gradient(45deg, #ffffff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 0.9rem; }

        /* ================== هيكلية التطبيق الرئيسي ================== */
        .sidebar {
            position: fixed; top: 0; right: 0; width: 280px; height: 100vh;
            background: var(--surface); border-left: 1px solid var(--border);
            padding: 30px 20px; display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-logo {
            font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 40px;
            background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: var(--radius);
            color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: var(--transition);
        }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(108,92,231,0.3); }
        .whatsapp-btn { background: #25D366; color: white; width: 100%; text-decoration: none; border-radius: var(--radius); padding: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .main-content { margin-right: 280px; padding: 40px; min-height: 100vh; }
        
        .header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
            background: var(--surface); padding: 20px 30px; border-radius: var(--radius); border: 1px solid var(--border);
        }
        .search-container { position: relative; flex: 1; max-width: 400px; }
        .search-container input { margin: 0; padding: 12px 45px 12px 20px; border-radius: 25px; }
        .search-container i { position: absolute; top: 50%; right: 18px; transform: translateY(-50%); color: var(--text-secondary); }
        .user-panel { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* الكروت والشبكات */
        .lessons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .lesson-card {
            background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: var(--transition); cursor: pointer;
        }
        .lesson-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: var(--shadow); }
        .lesson-card .thumb {
            height: 160px; background: linear-gradient(135deg, #1a1a30, #111122); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--accent); position: relative;
        }
        .lesson-card .info { padding: 20px; }
        .lesson-card .title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
        .lesson-card .meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text-secondary); }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; }
        .badge-active { background: rgba(46,213,115,0.15); color: var(--success); }
        .badge-lock { background: rgba(255,71,87,0.15); color: var(--danger); }

        /* ================== لوحة الإدارة ================== */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }
        .stat-card h3 { font-size: 2rem; color: var(--accent); margin-top: 5px; }
        .admin-sections { display: grid; grid-template-columns: 1fr; gap: 30px; }
        .admin-block { background: var(--surface); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border); }
        .admin-block h3 { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        
        .table-responsive { overflow-x: auto; margin-top: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .admin-table { width: 100%; border-collapse: collapse; text-align: right; font-size: 0.9rem; }
        .admin-table th, .admin-table td { padding: 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
        .admin-table th { background: var(--surface-light); color: var(--text); }

        .live-codes-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 15px; max-height: 250px; overflow-y: auto; padding-left: 5px; }
        .live-code-badge { padding: 8px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; text-align: center; font-weight: bold; border: 1px solid rgba(255,255,255,0.05); }
        .code-avail { background: rgba(46,213,115,0.1); color: var(--success); border-color: rgba(46,213,115,0.2); }
        .code-used-up { background: rgba(255,71,87,0.1); color: var(--danger); border-color: rgba(255,71,87,0.2); text-decoration: line-through; }

        /* النوافذ المنبثقة والمشغل */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal { background: var(--surface); border-radius: var(--radius); padding: 35px; width: 90%; max-width: 550px; border: 1px solid var(--border); position: relative; }
        .close-modal { position: absolute; top: 20px; left: 20px; background: none; border: none; color: white; font-size: 1.3rem; cursor: pointer; }

        .video-player-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .video-wrap { width: 90%; max-width: 950px; position: relative; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .video-wrap video, .video-wrap iframe { width: 100%; height: 530px; border: none; display: block; background: #000; }
        
        .video-watermark { 
            position: absolute; color: rgba(255, 255, 255, 0.18); font-size: 0.85rem; pointer-events: none; 
            background: rgba(0, 0, 0, 0.4); padding: 5px 12px; border-radius: 6px; z-index: 3100; font-weight: 600; 
            direction: ltr; bottom: 15px; left: 15px; border: 1px solid rgba(255,255,255,0.03); transition: all 0.5s ease-in-out;
        }
        .video-watermark.hint-center { bottom: 50% !important; left: 50% !important; transform: translate(-50%, 50%) scale(1.3); color: rgba(255, 255, 255, 0.45); background: rgba(0, 0, 0, 0.7); box-shadow: 0 0 20px rgba(0,0,0,0.6); }

        .toast-msg { position: fixed; bottom: 30px; left: 30px; padding: 14px 28px; border-radius: 30px; color: white; font-weight: 600; z-index: 9999; display: none; }
    </style>
</head>
<body>

    <div id="toast" class="toast-msg"></div>

    <!-- ================== واجهات الحسابات والدخول ================== -->
    <div id="authPage" class="auth-wrapper">
        <div class="auth-card" id="loginBox">
            <h2>مرحباً بك مجدداً</h2>
            <div class="auth-subtitle">المنصة التعليمية الرسمية للأستاذ أيمن الرفاعي</div>
            <input type="text" id="loginUser" placeholder="البريد الإلكتروني أو رقم الهاتف">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleLogin()">تسجيل دخول آمن <i class="fas fa-shield-alt"></i></button>
            <p style="text-align:center; margin-top:20px; color:var(--text-secondary); font-size:0.9rem;">طالب جديد؟ <span style="color:var(--accent); cursor:pointer; font-weight:700;" onclick="switchAuth('reg')">إنشاء حساب فوري</span></p>
        </div>

        <div class="auth-card" id="regBox" style="display:none;">
            <h2>توثيق حساب طالب</h2>
            <div class="auth-subtitle">يرجى إدخال البيانات الشخصية بدقة كاملة</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <input type="text" id="rFirst" placeholder="الاسم الأول">
                <input type="text" id="rFather" placeholder="اسم الأب">
                <input type="text" id="rGrand" placeholder="اسم الجد">
                <input type="text" id="rFamily" placeholder="العائلة">
            </div>
            <select id="rCountry">
                <option value="+963" selected>سوريا 🇸🇾 (+963)</option>
                <option value="+20">مصر 🇪🇬 (+20)</option>
                <option value="+966">السعودية 🇸🇦 (+966)</option>
                <option value="+962">الأردن 🇯🇴 (+962)</option>
            </select>
            <input type="tel" id="rPhone" placeholder="رقم الهاتف">
            <input type="email" id="rEmail" placeholder="البريد الإلكتروني (Gmail)">
            <input type="text" id="rCity" placeholder="المحافظة / المدينة">
            <input type="password" id="rPass" placeholder="كلمة مرور قوية">
            <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="handleRegister()">توثيق وإنشاء الحساب</button>
            <p style="text-align:center; margin-top:20px; color:var(--text-secondary); font-size:0.9rem;">لديك حساب بالفعل؟ <span style="color:var(--accent); cursor:pointer; font-weight:700;" onclick="switchAuth('login')">تسجيل دخول</span></p>
        </div>
    </div>

    <!-- ================== واجهة المنصة والتطبيق الرئيسي ================== -->
    <div id="appPage" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-logo">📘 منصة الرفاعي</div>
            <div class="sidebar-nav">
                <a href="#" class="active" id="navHome" onclick="changePage('home')"><i class="fas fa-graduation-cap"></i> أرشيف المحاضرات</a>
                <a href="#" id="navMyLessons" onclick="changePage('mylessons')"><i class="fas fa-play-circle"></i> محاضراتي المفتوحة</a>
                <a href="#" id="navAdmin" style="display:none;" onclick="changePage('admin')"><i class="fas fa-tools"></i> لوحة الإمبراطور الإدارية</a>
            </div>
            <div class="sidebar-footer">
                <a id="waLink" class="whatsapp-btn" href="#" target="_blank"><i class="fab fa-whatsapp"></i> طلب أكواد تفعيل</a>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchBar" placeholder="ابحث عن محاضرة معينة..." oninput="triggerSearch()">
                </div>
                <div class="user-panel">
                    <div class="avatar" id="userInitial">أ</div>
                    <div>
                        <div id="uNameDisplay" style="font-weight:700;">...</div>
                        <div id="uRoleDisplay" style="font-size:0.75rem; color:var(--accent);">طالب</div>
                    </div>
                    <button class="btn btn-outline btn-sm" style="margin-right:15px;" onclick="userLogout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </div>
            </div>

            <div id="pageContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFHLZgG6-SBhYh5gq83WmZJktDDngKoRU",
            authDomain: "aiman-6f132.firebaseapp.com",
            projectId: "aiman-6f132",
            storageBucket: "aiman-6f132.firebasestorage.app",
            messagingSenderId: "1089902227369",
            appId: "1:1089902227369:web:9d2bbc7663381b1acf9eb8",
            measurementId: "G-NBWCHGZ5FK"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let sessionUser = null;
        let globalVideos = [];
        let userUnlockedIds = [];
        let currentActiveView = 'home';
        let adminSelectedVideoIdForCodes = ''; 

        function msgToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.style.background = type === 'error' ? 'var(--danger)' : type === 'warning' ? 'var(--warning)' : 'var(--success)';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        function switchAuth(target) {
            document.getElementById('loginBox').style.display = target === 'login' ? 'block' : 'none';
            document.getElementById('regBox').style.display = target === 'reg' ? 'block' : 'none';
        }

        function buildFingerprint() {
            return btoa(navigator.userAgent + screen.width).substring(0, 25);
        }

        // ======================= نظام تسجيل الدخول المحسن =======================
        async function handleLogin() {
            const userInp = document.getElementById('loginUser').value.trim();
            const passInp = document.getElementById('loginPass').value;

            if (!userInp || !passInp) return msgToast('الرجاء تعبئة كافة الحقول', 'error');

            // حساب الأدمن ثابت كما طلبته بالضبط ولا يتغير
            if (userInp === 'admin12344321@1x' && passInp === 'admin12344321@1x') {
                sessionUser = { uid: 'SUPER_ADMIN', fullName: 'الأستاذ أيمن الرفاعي', firstName: 'أيمن', phone: 'الإدارة العامة', role: 'admin' };
                localStorage.setItem('refaiSession', JSON.stringify(sessionUser));
                initSession();
                return;
            }

            try {
                let snap = await db.collection('users').where('email', '==', userInp).get();
                if (snap.empty) snap = await db.collection('users').where('phone', '==', userInp).get();
                if (snap.empty) return msgToast('بيانات الحساب غير مسجلة بالمنصة', 'error');

                const docRef = snap.docs[0];
                const data = docRef.data();

                if (data.password !== passInp) return msgToast('كلمة المرور غير صحيحة', 'error');
                if (data.blocked) return msgToast('هذا الحساب محظور حالياً لمخالفة شروط الحماية', 'error');

                const print = buildFingerprint();
                if (data.deviceFingerprint && data.deviceFingerprint !== print && data.role !== 'admin') {
                    await db.collection('users').doc(docRef.id).update({ blocked: true, securityAlert: "تغيير بصمة الجهاز المعتمدة" });
                    return msgToast('🔴 تم قفل الحساب تلقائياً لحمايته من التوزيع والمشاركة!', 'error');
                }

                await db.collection('users').doc(docRef.id).update({ deviceFingerprint: print, lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
                sessionUser = { uid: docRef.id, ...data, deviceFingerprint: print };
                localStorage.setItem('refaiSession', JSON.stringify(sessionUser));
                initSession();
            } catch (err) { msgToast(err.message, 'error'); }
        }

        // ======================= نظام إنشاء الحساب الفوري المصحح =======================
        async function handleRegister() {
            const first = document.getElementById('rFirst').value.trim();
            const father = document.getElementById('rFather').value.trim();
            const grand = document.getElementById('rGrand').value.trim();
            const family = document.getElementById('rFamily').value.trim();
            const phone = document.getElementById('rCountry').value + document.getElementById('rPhone').value.trim();
            const email = document.getElementById('rEmail').value.trim();
            const city = document.getElementById('rCity').value.trim();
            const pass = document.getElementById('rPass').value;

            if(!first || !phone || !email || !pass) return msgToast('يرجى ملء الحقول الأساسية لتوثيق الطالب', 'error');

            try {
                // فحص دقيق لمنع التكرار ومنع حدوث أخطاء مرتين عند الضغط
                const checkEmail = await db.collection('users').where('email', '==', email).get();
                if(!checkEmail.empty) return msgToast('عذراً، هذا البريد الإلكتروني مسجل بحساب آخر مسبقاً!', 'error');
                
                const checkPhone = await db.collection('users').where('phone', '==', phone).get();
                if(!checkPhone.empty) return msgToast('رقم الهاتف هذا مسجل بحساب آخر مسبقاً!', 'error');

                const print = buildFingerprint();
                const newUser = {
                    firstName: first, 
                    fullName: `${first} ${father} ${grand} ${family}`, 
                    email: email, 
                    phone: phone,
                    city: city, 
                    password: pass, 
                    role: 'user', 
                    deviceFingerprint: print, 
                    blocked: false, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                const docRef = await db.collection('users').add(newUser);
                
                // الدخول الفوري والمباشر بعد نجاح الإنشاء بنجاح
                sessionUser = { uid: docRef.id, ...newUser };
                localStorage.setItem('refaiSession', JSON.stringify(sessionUser));
                
                msgToast('تم توثيق حسابك بنجاح، مرحباً بك!', 'success');
                initSession();
            } catch(e) { msgToast(e.message, 'error'); }
        }

        function userLogout() { localStorage.removeItem('refaiSession'); location.reload(); }

        function initSession() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            document.getElementById('userInitial').textContent = sessionUser.firstName ? sessionUser.firstName.charAt(0) : 'أ';
            document.getElementById('uNameDisplay').textContent = sessionUser.fullName;
            document.getElementById('uRoleDisplay').textContent = sessionUser.role === 'admin' ? 'المدير العام للمنصة' : 'طالب رسمي مفعّل';
            if(sessionUser.role === 'admin') document.getElementById('navAdmin').style.display = 'block';
            startRealtimeListeners();
            changePage('home');
        }

        // ======================= الاستماع الفوري وحل مشكلة اختفاء الفيديوهات =======================
        function startRealtimeListeners() {
            db.collection('videos').onSnapshot(snap => {
                globalVideos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // تم تعديل منطق الترتيب لمنع اختفاء الفيديوهات في حالة لم يتم اكتمال وقت السيرفر المحلي بعد التحديث
                globalVideos.sort((a, b) => {
                    const timeA = a.createdAt ? (a.createdAt.toMillis ? a.createdAt.toMillis() : a.createdAt) : Date.now();
                    const timeB = b.createdAt ? (b.createdAt.toMillis ? b.createdAt.toMillis() : b.createdAt) : Date.now();
                    return timeB - timeA;
                });

                if(sessionUser.role === 'admin') userUnlockedIds = globalVideos.map(v => v.id);
                refreshCurrentView();
            }, err => { console.error("Video error:", err); });

            if(sessionUser.role !== 'admin') {
                db.collection('activations').where('userId', '==', sessionUser.uid).onSnapshot(snap => {
                    userUnlockedIds = snap.docs.map(doc => doc.data().videoId);
                    refreshCurrentView();
                });
            }
        }

        function refreshCurrentView() {
            if(currentActiveView === 'home') buildHomeView();
            else if(currentActiveView === 'mylessons') buildMyLessonsView();
            else if(currentActiveView === 'admin') buildAdminDashboard();
        }

        function changePage(target) {
            currentActiveView = target;
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            if(target === 'home') { document.getElementById('navHome').classList.add('active'); buildHomeView(); }
            else if(target === 'mylessons') { document.getElementById('navMyLessons').classList.add('active'); buildMyLessonsView(); }
            else if(target === 'admin') { document.getElementById('navAdmin').classList.add('active'); buildAdminDashboard(); }
        }

        function buildHomeView() {
            document.getElementById('pageContent').innerHTML = `<h2 style="margin-bottom:20px; font-weight:800;">📚 أرشيف المحاضرات العامة</h2><div class="lessons-grid" id="mainGrid"></div>`;
            renderCards(globalVideos, 'mainGrid');
        }

        function buildMyLessonsView() {
            const list = globalVideos.filter(v => userUnlockedIds.includes(v.id));
            document.getElementById('pageContent').innerHTML = `<h2 style="margin-bottom:20px; font-weight:800;">🎥 محاضراتي المفتوحة (${list.length})</h2><div class="lessons-grid" id="myGrid"></div>`;
            if(list.length === 0) document.getElementById('myGrid').innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:40px;">لا يوجد دروس مفعّلة حالياً بحسابك.</p>`;
            else renderCards(list, 'myGrid');
        }

        function renderCards(list, elementId) {
            const target = document.getElementById(elementId);
            if(!target) return; target.innerHTML = '';
            list.forEach(v => {
                const opened = userUnlockedIds.includes(v.id);
                const el = document.createElement('div');
                el.className = 'lesson-card';
                el.innerHTML = `
                    <div class="thumb"><i class="fas ${opened ? 'fa-play-circle' : 'fa-lock'}" style="${opened ? 'color:var(--accent)' : 'color:var(--danger)'}"></i></div>
                    <div class="info">
                        <div class="title">${v.title}</div>
                        <div class="meta"><span><i class="far fa-play-circle"></i> بث محمي</span><span class="badge ${opened ? 'badge-active' : 'badge-lock'}">${opened ? 'مفتوح للدراسة' : 'مغلق'}</span></div>
                    </div>
                `;
                el.onclick = () => { if(opened) launchSecureStream(v); else displayActivationModal(v); };
                target.appendChild(el);
            });
        }

        function triggerSearch() {
            const q = document.getElementById('searchBar').value.toLowerCase().trim();
            const fil = globalVideos.filter(v => v.title.toLowerCase().includes(q));
            renderCards(fil, currentActiveView === 'home' ? 'mainGrid' : 'myGrid');
        }

        function displayActivationModal(video) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay active';
            overlay.innerHTML = `
                <div class="modal">
                    <button class="close-modal" onclick="this.parentElement.parentElement.remove()">✖</button>
                    <h2>🔑 تفعيل كود المحاضرة</h2>
                    <p style="color:var(--text-secondary); margin-bottom:15px;">اكتب كود التفعيل المخصص لـ: <b>${video.title}</b></p>
                    <input type="text" id="cdInp" placeholder="أدخل الكود هنا بشكل صحيح..." style="text-transform:uppercase;">
                    <button class="btn btn-primary" style="width:100%; margin-top:10px;" id="actBtn">تأكيد التفعيل الفوري</button>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('#actBtn').onclick = async () => {
                const code = overlay.querySelector('#cdInp').value.trim().toUpperCase();
                if(!code) return msgToast('الرجاء كتابة الكود', 'warning');
                try {
                    const snap = await db.collection('videos').doc(video.id).collection('codes').where('code', '==', code).limit(1).get();
                    if(snap.empty) return msgToast('كود التفعيل خاطئ أو مخصص لمادة أخرى!', 'error');
                    
                    const cDoc = snap.docs[0];
                    if(cDoc.data().usedBy) return msgToast('هذا الكود تم استهلاكه سابقاً من طالب آخر!', 'error');

                    await db.collection('videos').doc(video.id).collection('codes').doc(cDoc.id).update({
                        usedBy: sessionUser.uid, usedByName: sessionUser.fullName, usedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await db.collection('activations').add({ userId: sessionUser.uid, videoId: video.id, code: code });
                    overlay.remove();
                    msgToast('تم تفعيل المحاضرة بنجاح مطلق!', 'success');
                } catch(e) { msgToast(e.message, 'error'); }
            };
        }

        function launchSecureStream(video) {
            const p = document.createElement('div');
            p.className = 'video-player-overlay';
            
            let playerHtml = '';
            if(video.type === 'embed') {
                playerHtml = `<iframe src="${video.storageURL}" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin"></iframe>`;
            } else {
                playerHtml = `<video src="${video.storageURL}" controls autoplay controlsList="nodownload" disablePictureInPicture></video>`;
            }

            p.innerHTML = `
                <div style="position:absolute; top:20px; left:20px; z-index:3200;"><button class="btn btn-danger btn-sm" onclick="clearInterval(window.wmInterval); this.parentElement.parentElement.remove()">✖ إغلاق البث</button></div>
                <div class="video-wrap">
                    ${playerHtml}
                    <div class="video-watermark" id="vWm">ID: ${sessionUser.fullName} | ${sessionUser.phone}</div>
                </div>
            `;
            document.body.appendChild(p);

            window.wmInterval = setInterval(() => {
                const el = document.getElementById('vWm'); 
                if(!el) return;
                if(!el.classList.contains('hint-center')) {
                    el.classList.add('hint-center');
                    setTimeout(() => { if(el) el.classList.remove('hint-center'); }, 4000);
                }
            }, 12000);
        }

        // ======================= لوحة التحكم الإدارية الكاملة =======================
        async function buildAdminDashboard() {
            document.getElementById('pageContent').innerHTML = `
                <h2 style="font-weight:900; margin-bottom:20px;"><i class="fas fa-crown"></i> لوحة التحكم الإدارية والتحليل الشامل</h2>
                
                <div class="stats-row">
                    <div class="stat-card">إجمالي المحاضرات<h3 id="stVid">0</h3></div>
                    <div class="stat-card">الطلاب المسجلين<h3 id="stUsers">0</h3></div>
                    <div class="stat-card">الحسابات المحظورة<h3 id="stBlocks">0</h3></div>
                </div>

                <div style="margin-bottom: 25px;">
                     <button class="btn btn-danger" onclick="adminResetAllDevices()"><i class="fas fa-sync-alt"></i> تصفير بصمة الأجهزة لجميع الطلاب دفعة واحدة</button>
                </div>

                <div class="admin-sections">
                    <div class="admin-block">
                        <h3><i class="fas fa-upload"></i> نظام نشر ورفع الفيديوهات والمحاضرات</h3>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                            <input type="text" id="admTitle" placeholder="عنوان المحاضرة والدرس">
                            <select id="admType" onchange="toggleUploadTypeHint()">
                                <option value="direct">رابط مباشر فائق السرعة (MP4)</option>
                                <option value="embed">تضمين كود مشغل خارجي (Vimeo / YouTube / Bunny)</option>
                            </select>
                        </div>
                        <input type="url" id="admUrl" placeholder="أدخل الرابط المباشر أو كود الـ Embed هنا...">
                        <button class="btn btn-primary" onclick="adminPublishVideo()"><i class="fas fa-paper-plane"></i> نشر وإطلاق فوري للمنصة</button>

                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead><tr><th>المحاضرة المنشورة</th><th>النوع</th><th>الأكواد والجرد</th><th>إجراءات الحذف</th></tr></thead>
                                <tbody id="admVidTable"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="admin-block" id="codesSectionBlock" style="display:none; border-color:var(--accent);">
                        <h3><i class="fas fa-key"></i> إدارة وفحص أكواد المحاضرة الحية: <span id="targetCodeTitle" style="color:white;"></span></h3>
                        <div style="display:flex; gap:10px; margin-bottom:15px;">
                            <button class="btn btn-primary btn-sm" onclick="adminGenerateMassCodes()">⚙️ توليد 50 كود عشوائي محمي</button>
                            <button class="btn btn-outline btn-sm" onclick="adminGenerateCustomCode()">✏️ إنشاء كود اسمي مخصص</button>
                        </div>
                        <div class="live-codes-container" id="admCodesGrid"></div>
                    </div>

                    <div class="admin-block">
                        <h3><i class="fas fa-users"></i> قاعدة بيانات الطلاب المشتركين بالمنصة</h3>
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead><tr><th>اسم الطالب الكامل</th><th>رقم الهاتف والاتصال</th><th>تعديل كلمة المرور</th><th>حالة القفل</th><th>إجراءات إدارية</th></tr></thead>
                                <tbody id="admUsersTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            loadAdminDataRealtime();
        }

        function toggleUploadTypeHint() {
            const type = document.getElementById('admType').value;
            const inp = document.getElementById('admUrl');
            if(type === 'embed') inp.placeholder = "ضع رابط الـ Embed (مثال: https://www.youtube.com/embed/xxxxxx)";
            else inp.placeholder = "ضع رابط الملف المباشر (ينتهي بـ .mp4)";
        }

        function loadAdminDataRealtime() {
            document.getElementById('stVid').textContent = globalVideos.length;
            
            const vTable = document.getElementById('admVidTable'); vTable.innerHTML = '';
            globalVideos.forEach(v => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${v.title}</b></td>
                    <td><span class="badge badge-active">${v.type || 'direct'}</span></td>
                    <td>
                        <button class="btn btn-outline btn-sm" style="color:var(--accent); border-color:var(--accent);" onclick="selectVideoForCodesTracking('${v.id}','${v.title}')"><i class="fas fa-eye"></i> تتبع وفحص الأكواد</button>
                    </td>
                    <td><button class="btn btn-danger btn-sm" onclick="adminDeleteVideo('${v.id}')">حذف الدرس</button></td>
                `;
                vTable.appendChild(tr);
            });

            db.collection('users').orderBy('createdAt','desc').onSnapshot(snap => {
                document.getElementById('stUsers').textContent = snap.size;
                const uTable = document.getElementById('admUsersTable'); uTable.innerHTML = '';
                let blockCount = 0;

                snap.forEach(doc => {
                    const u = doc.data();
                    if(u.role === 'admin') return;

                    if(u.blocked) blockCount++;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><b>${u.fullName}</b><br><small style="color:var(--text-secondary);">${u.email}</small></td>
                        <td><code>${u.phone}</code></td>
                        <td>
                            <input type="text" value="${u.password}" style="width:110px; padding:4px 10px; margin:0; border-radius:10px;" onchange="adminUpdateUserPassword('${doc.id}', this.value)">
                        </td>
                        <td>${u.blocked ? '<span class="badge badge-lock">محظور ومقفل</span>' : '<span class="badge badge-active">نشط آمن</span>'}</td>
                        <td>
                            ${u.blocked ? `<button class="btn btn-primary btn-sm" onclick="toggleUserStatus('${doc.id}', false)">🔓 فك القفل</button>` : 
                            `<button class="btn btn-danger btn-sm" onclick="toggleUserStatus('${doc.id}', true)">⛔ حظر فوري</button>`}
                        </td>
                    `;
                    uTable.appendChild(tr);
                });
                document.getElementById('stBlocks').textContent = blockCount;
            });
        }

        async function adminPublishVideo() {
            const title = document.getElementById('admTitle').value.trim();
            const type = document.getElementById('admType').value;
            const url = document.getElementById('admUrl').value.trim();

            if(!title || !url) return msgToast('الرجاء كتابة العنوان وتحديد رابط البث', 'warning');

            try {
                await db.collection('videos').add({
                    title: title, 
                    type: type, 
                    storageURL: url, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('admTitle').value = '';
                document.getElementById('admUrl').value = '';
                msgToast('تم نشر الفيديو بنجاح ويعمل الآن دون اختفاء لجميع المشتركين');
            } catch(e) { msgToast(e.message, 'error'); }
        }

        async function adminDeleteVideo(id) {
            if(confirm('هل أنت متأكد من مسح هذه المحاضرة؟')) {
                await db.collection('videos').doc(id).delete();
                msgToast('تم حذف الدرس بنجاح');
                document.getElementById('codesSectionBlock').style.display = 'none';
            }
        }

        async function toggleUserStatus(id, isBlock) {
            await db.collection('users').doc(id).update({ blocked: isBlock, deviceFingerprint: isBlock ? "blocked" : "" });
            msgToast('تم تحديث حالة الحساب وتصفير البصمة بنجاح');
        }

        async function adminUpdateUserPassword(id, newPass) {
            if(!newPass.trim()) return msgToast('كلمة المرور لا يمكن أن تكون فارغة', 'warning');
            await db.collection('users').doc(id).update({ password: newPass.trim() });
            msgToast('تم تعديل كلمة مرور الطالب فورياً');
        }

        async function adminResetAllDevices() {
            if(confirm('هل أنت متأكد من إعادة تعيين بصمة الجهاز لكافة الطلاب؟')) {
                try {
                    const snap = await db.collection('users').where('role', '==', 'user').get();
                    const batch = db.batch();
                    snap.forEach(doc => {
                        batch.update(db.collection('users').doc(doc.id), { deviceFingerprint: "" });
                    });
                    await batch.commit();
                    msgToast('تم تصفير أجهزة جميع الطلاب بنجاح مطلق!', 'success');
                } catch(e) { msgToast(e.message, 'error'); }
            }
        }

        function selectVideoForCodesTracking(id, title) {
            adminSelectedVideoIdForCodes = id; 
            document.getElementById('codesSectionBlock').style.display = 'block';
            document.getElementById('targetCodeTitle').textContent = title;

            db.collection('videos').doc(id).collection('codes').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const grid = document.getElementById('admCodesGrid'); grid.innerHTML = '';
                if(snap.empty) { grid.innerHTML = '<p style="color:var(--text-secondary); padding:10px;">لا يوجد أكواد حالياً.</p>'; return; }

                snap.forEach(doc => {
                    const c = doc.data();
                    const d = document.createElement('div');
                    if(c.usedBy) {
                        d.className = 'live-code-badge code-used-up';
                        d.innerHTML = `${c.code}`;
                    } else {
                        d.className = 'live-code-badge code-avail';
                        d.innerHTML = `${c.code}`;
                    }
                    grid.appendChild(d);
                });
            });
        }

        async function adminGenerateMassCodes() {
            if(!adminSelectedVideoIdForCodes) return;
            const batch = db.batch();
            const ref = db.collection('videos').doc(adminSelectedVideoIdForCodes).collection('codes');
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            
            for(let i=0; i<50; i++) {
                let code = ''; for(let c=0; c<8; c++) code += chars.charAt(Math.floor(Math.random() * chars.length));
                batch.set(ref.doc(), { code: code, usedBy: null, usedByName: null, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            }
            await batch.commit(); msgToast('تم توليد 50 كود تفعيل مشفر بنجاح دفعة واحدة');
        }

        async function adminGenerateCustomCode() {
            if(!adminSelectedVideoIdForCodes) return;
            const text = prompt('اكتب الكود المخصص الذي تريده:');
            if(!text) return;
            const formatted = text.trim().toUpperCase();

            await db.collection('videos').doc(adminSelectedVideoIdForCodes).collection('codes').add({
                code: formatted, usedBy: null, usedByName: null, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            msgToast(`تم إنشاء الكود المخصص [ ${formatted} ]`);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const cached = localStorage.getItem('refaiSession');
            if(cached) { sessionUser = JSON.parse(cached); initSession(); }
            else { document.getElementById('authPage').style.display = 'flex'; }

            db.collection('settings').doc('site').onSnapshot(snap => {
                if(snap.exists && snap.data().whatsappLink) document.getElementById('waLink').href = snap.data().whatsappLink;
                else document.getElementById('waLink').href = "https://wa.me/963930000000";
            });
        });
    </script>
</body>
</html>
