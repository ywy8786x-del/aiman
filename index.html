<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ أيمن الرفاعي التعليمية - الإصدار الفاخر v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4bd1;
            --accent: #00cec9;
            --bg: #05050a;
            --surface: #0f0f1e;
            --surface-light: #16162d;
            --text: #ffffff;
            --text-secondary: #8f8fa8;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --radius: 18px;
            --shadow: 0 15px 50px rgba(0,0,0,0.8);
            --border: rgba(255,255,255,0.06);
            --glow: 0 0 20px rgba(108, 92, 231, 0.2);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 10%, rgba(108,92,231,0.15) 0%, transparent 45%),
                              radial-gradient(circle at 90% 90%, rgba(0,206,201,0.1) 0%, transparent 45%);
        }

        /* تحسينات المدخلات */
        input, select, textarea {
            width: 100%; padding: 15px 22px; border-radius: 30px; margin: 10px 0;
            border: 1px solid var(--border); background: var(--surface-light);
            color: white; font-family: 'Tajawal'; font-size: 0.95rem; transition: all 0.25s ease;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; border-color: var(--accent); 
            box-shadow: 0 0 15px rgba(0,206,201,0.25); transform: translateY(-1px);
        }
        .focused-field { border-color: var(--primary) !important; box-shadow: 0 0 12px rgba(108,92,231,0.3); }

        .btn {
            padding: 14px 28px; border-radius: 30px; font-weight: 700; border: none;
            cursor: pointer; transition: all 0.25s ease; font-family: 'Tajawal';
            display: inline-flex; align-items: center; gap: 10px; font-size: 0.95rem; justify-content: center;
        }
        .btn-primary { background: linear-gradient(45deg, var(--primary), var(--accent)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--surface-light); border-color: var(--text-secondary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { box-shadow: 0 5px 15px rgba(255,71,87,0.3); }
        .btn-sm { padding: 8px 16px; font-size: 0.8rem; border-radius: 20px; }

        /* ================== شاشات المصادقة (Auth) ================== */
        .auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card {
            background: rgba(15, 15, 30, 0.75); backdrop-filter: blur(25px);
            padding: 50px 40px; border-radius: 28px; width: 100%; max-width: 500px;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            animation: fadeIn 0.4s ease-out;
        }
        .auth-card h2 {
            text-align: center; margin-bottom: 8px; font-size: 2.2rem; font-weight: 900;
            background: linear-gradient(45deg, #ffffff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 35px; font-size: 0.95rem; }

        /* ================== تصميم النظام الداخلي ================== */
        .sidebar {
            position: fixed; top: 0; right: 0; width: 290px; height: 100vh;
            background: var(--surface); border-left: 1px solid var(--border);
            padding: 35px 20px; display: flex; flex-direction: column; z-index: 1000;
        }
        .sidebar-logo {
            font-size: 1.6rem; font-weight: 900; text-align: center; margin-bottom: 45px;
            background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 14px; padding: 15px 20px; border-radius: var(--radius);
            color: var(--text-secondary); text-decoration: none; font-weight: 600; transition: all 0.25s;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: var(--primary); color: white; box-shadow: var(--glow); }
        .whatsapp-btn { background: #25D366; color: white; width: 100%; text-decoration: none; border-radius: var(--radius); padding: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(37,211,102,0.2); transition: 0.25s; }
        .whatsapp-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,211,102,0.4); }

        .main-content { margin-right: 290px; padding: 45px; min-height: 100vh; }
        
        .header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
            background: var(--surface); padding: 22px 35px; border-radius: var(--radius); border: 1px solid var(--border);
        }
        .search-container { position: relative; flex: 1; max-width: 420px; }
        .search-container input { margin: 0; padding: 14px 50px 14px 20px; border-radius: 30px; }
        .search-container i { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); color: var(--text-secondary); }
        .user-panel { display: flex; align-items: center; gap: 18px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; box-shadow: var(--glow); }

        /* شبكة المحاضرات والكروت */
        .lessons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 30px; margin-top: 20px; }
        .lesson-card {
            background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative;
        }
        .lesson-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: var(--shadow); }
        .lesson-card .thumb {
            height: 170px; background: linear-gradient(135deg, #14142b, #0f0f1e); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; color: var(--accent); position: relative;
        }
        .lesson-card .info { padding: 22px; }
        .lesson-card .title { font-size: 1.15rem; font-weight: 800; margin-bottom: 14px; line-height: 1.4; }
        .lesson-card .meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--text-secondary); }
        
        .badge { padding: 5px 12px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; }
        .badge-active { background: rgba(46,213,115,0.12); color: var(--success); }
        .badge-lock { background: rgba(255,71,87,0.12); color: var(--danger); }

        /* ================== لوحة التحكم الإدارية الفاخرة ================== */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; margin-bottom: 35px; }
        .stat-card { background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; position: relative; overflow: hidden; }
        .stat-card h3 { font-size: 2.3rem; color: var(--accent); margin-top: 8px; font-weight: 900; }
        .admin-sections { display: grid; grid-template-columns: 1fr; gap: 35px; }
        .admin-block { background: var(--surface); padding: 35px; border-radius: var(--radius); border: 1px solid var(--border); }
        .admin-block h3 { margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 12px; color: var(--accent); display: flex; align-items: center; gap: 12px; font-size: 1.3rem; }
        
        .table-responsive { overflow-x: auto; margin-top: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .admin-table { width: 100%; border-collapse: collapse; text-align: right; font-size: 0.95rem; }
        .admin-table th, .admin-table td { padding: 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
        .admin-table th { background: var(--surface-light); color: var(--text); font-weight: 700; }

        .live-codes-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; max-height: 280px; overflow-y: auto; padding: 5px; }
        .live-code-badge { padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.9rem; text-align: center; font-weight: bold; border: 1px solid rgba(255,255,255,0.04); }
        .code-avail { background: rgba(46,213,115,0.08); color: var(--success); border-color: rgba(46,213,115,0.2); }
        .code-used-up { background: rgba(255,71,87,0.08); color: var(--danger); border-color: rgba(255,71,87,0.2); text-decoration: line-through; }

        /* ================== نظام الرسائل والنوافذ الفاخر بمنتصف الشاشة ================== */
        .center-popup-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px); z-index: 5000; display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.25s ease-out;
        }
        .center-popup {
            background: var(--surface); border-radius: 24px; padding: 40px; width: 90%; max-width: 460px;
            border: 1px solid var(--border); text-align: center; box-shadow: var(--shadow);
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .center-popup .icon-box {
            width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center; font-size: 2rem;
        }
        .icon-success { background: rgba(46,213,115,0.15); color: var(--success); }
        .icon-error { background: rgba(255,71,87,0.15); color: var(--danger); }
        .icon-warning { background: rgba(255,71,87,0.15); color: var(--warning); }
        .center-popup h4 { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; }
        .center-popup p { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; margin-bottom: 25px; }

        /* مشغل الفيديوهات المحمي الفاخر */
        .video-player-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 4000; display: flex; align-items: center; justify-content: center; }
        .video-wrap { width: 92%; max-width: 1000px; position: relative; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,0.9); }
        .video-wrap video, .video-wrap iframe { width: 100%; height: 560px; border: none; display: block; background: #000; }
        
        .video-watermark { 
            position: absolute; color: rgba(255, 255, 255, 0.15); font-size: 0.9rem; pointer-events: none; 
            background: rgba(0, 0, 0, 0.5); padding: 6px 14px; border-radius: 8px; z-index: 4100; font-weight: 700; 
            direction: ltr; bottom: 20px; left: 20px; border: 1px solid rgba(255,255,255,0.04); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .video-watermark.hint-center { bottom: 50% !important; left: 50% !important; transform: translate(-50%, 50%) scale(1.4); color: rgba(255, 255, 255, 0.5); background: rgba(0, 0, 0, 0.85); box-shadow: 0 0 30px rgba(0,0,0,0.8); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <!-- ================== صفحة تسجيل الدخول وإنشاء الحساب ================== -->
    <div id="authPage" class="auth-wrapper">
        <div class="auth-card" id="loginBox">
            <h2>مرحباً بك مجدداً</h2>
            <div class="auth-subtitle">المنصة التعليمية الرسمية للأستاذ أيمن الرفاعي</div>
            <input type="text" class="nav-input" id="loginUser" placeholder="البريد الإلكتروني أو رقم الهاتف">
            <input type="password" class="nav-input" id="loginPass" placeholder="كلمة المرور">
            <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="handleLogin()">تسجيل دخول آمن <i class="fas fa-shield-alt"></i></button>
            <p style="text-align:center; margin-top:25px; color:var(--text-secondary); font-size:0.9rem;">طالب جديد؟ <span style="color:var(--accent); cursor:pointer; font-weight:700;" onclick="switchAuth('reg')">إنشاء حساب فوري</span></p>
        </div>

        <div class="auth-card" id="regBox" style="display:none;">
            <h2>توثيق حساب طالب</h2>
            <div class="auth-subtitle">يرجى إدخال البيانات الشخصية بدقة كاملة وموثوقة</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" class="nav-input" id="rFirst" placeholder="الاسم الأول">
                <input type="text" class="nav-input" id="rFather" placeholder="اسم الأب">
                <input type="text" class="nav-input" id="rGrand" placeholder="اسم الجد">
                <input type="text" class="nav-input" id="rFamily" placeholder="العائلة">
            </div>
            <select class="nav-input" id="rCountry">
                <option value="+963" selected>سوريا 🇸🇾 (+963)</option>
                <option value="+20">مصر 🇪🇬 (+20)</option>
                <option value="+966">السعودية 🇸🇦 (+966)</option>
                <option value="+962">الأردن 🇯🇴 (+962)</option>
            </select>
            <input type="tel" class="nav-input" id="rPhone" placeholder="رقم الهاتف">
            <input type="email" class="nav-input" id="rEmail" placeholder="البريد الإلكتروني (Gmail)">
            <input type="text" class="nav-input" id="rCity" placeholder="المحافظة / المدينة">
            <input type="password" class="nav-input" id="rPass" placeholder="كلمة مرور قوية للخصوصية">
            <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="handleRegister()">توثيق وإنشاء الحساب</button>
            <p style="text-align:center; margin-top:25px; color:var(--text-secondary); font-size:0.9rem;">لديك حساب بالفعل؟ <span style="color:var(--accent); cursor:pointer; font-weight:700;" onclick="switchAuth('login')">تسجيل دخول</span></p>
        </div>
    </div>

    <!-- ================== الهيكل الرئيسي للمنصة الداخية ================== -->
    <div id="appPage" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-logo">📘 أكاديمية الرفاعي</div>
            <div class="sidebar-nav">
                <a href="#" class="active" id="navHome" onclick="changePage('home')"><i class="fas fa-graduation-cap"></i> أرشيف المحاضرات</a>
                <a href="#" id="navMyLessons" onclick="changePage('mylessons')"><i class="fas fa-play-circle"></i> محاضراتي المفتوحة</a>
                <a href="#" id="navAdmin" style="display:none;" onclick="changePage('admin')"><i class="fas fa-tools"></i> لوحة التحكم الإدارية</a>
            </div>
            <div class="sidebar-footer">
                <a id="waLink" class="whatsapp-btn" href="#" target="_blank"><i class="fab fa-whatsapp"></i> طلب أكواد تفعيل</a>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchBar" placeholder="ابحث عن محاضرة معينة..." oninput="triggerSearch()">
                </div>
                <div class="user-panel">
                    <div class="avatar" id="userInitial">أ</div>
                    <div>
                        <div id="uNameDisplay" style="font-weight:800;">...</div>
                        <div id="uRoleDisplay" style="font-size:0.8rem; color:var(--accent);">طالب مفعّل</div>
                    </div>
                    <button class="btn btn-outline btn-sm" style="margin-right:15px;" onclick="userLogout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </div>
            </div>

            <div id="pageContent"></div>
        </div>
    </div>

    <!-- استدعاء ملفات Firebase الرسمية والمستقرة -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بقاعدة البيانات
        const firebaseConfig = {
            apiKey: "AIzaSyCFHLZgG6-SBhYh5gq83WmZJktDDngKoRU",
            authDomain: "aiman-6f132.firebaseapp.com",
            projectId: "aiman-6f132",
            storageBucket: "aiman-6f132.firebasestorage.app",
            messagingSenderId: "1089902227369",
            appId: "1:1089902227369:web:9d2bbc7663381b1acf9eb8",
            measurementId: "G-NBWCHGZ5FK"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let sessionUser = null;
        let globalVideos = [];
        let userUnlockedIds = [];
        let currentActiveView = 'home';
        let adminSelectedVideoIdForCodes = '';

        // ======================= نظام الرسائل الفاخر بمنتصف الشاشة =======================
        function showCenterAlert(title, message, type = 'success', onConfirm = null) {
            const existing = document.querySelector('.center-popup-overlay');
            if (existing) existing.remove();

            const iconMap = { success: 'fa-check', error: 'fa-times', warning: 'fa-exclamation' };
            const overlay = document.createElement('div');
            overlay.className = 'center-popup-overlay';
            overlay.innerHTML = `
                <div class="center-popup">
                    <div class="icon-box icon-${type}"><i class="fas ${iconMap[type]}"></i></div>
                    <h4>${title}</h4>
                    <p>${message}</p>
                    <button class="btn btn-primary popup-close-btn" style="padding: 10px 35px; min-width:140px;">موافق</button>
                </div>
            `;
            document.body.appendChild(overlay);

            const closeBtn = overlay.querySelector('.popup-close-btn');
            closeBtn.focus();

            const closeAction = () => {
                overlay.remove();
                if(onConfirm) onConfirm();
            };

            closeBtn.onclick = closeAction;
            overlay.onclick = (e) => { if(e.target === overlay) closeAction(); };
        }

        // ======================= هندسة لوحة المفاتيح والأسهم والإنتر =======================
        function setupKeyboardEngine() {
            document.addEventListener('keydown', (e) => {
                const active = document.activeElement;
                if (!active || !active.classList.contains('nav-input')) return;

                const inputs = Array.from(document.querySelectorAll('.auth-card:not([style*="display: none"]) .nav-input'));
                const index = inputs.indexOf(active);

                if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    const next = inputs[index + 1] || inputs[0];
                    if(next) next.focus();
                } 
                else if (e.key === 'ArrowUp' || e.key === 'ArrowRight') {
                    e.preventDefault();
                    const prev = inputs[index - 1] || inputs[inputs.length - 1];
                    if(prev) prev.focus();
                } 
                else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (document.getElementById('loginBox').style.display !== 'none') {
                        handleLogin();
                    } else {
                        handleRegister();
                    }
                }
            });

            // دعم تفعيل كود الدرس بواسطة الـ Enter
            document.addEventListener('keydown', (e) => {
                if(e.key === 'Enter' && document.getElementById('cdInp') && document.activeElement === document.getElementById('cdInp')) {
                    e.preventDefault();
                    const btn = document.getElementById('actBtn');
                    if(btn) btn.click();
                }
            });
        }

        function switchAuth(target) {
            document.getElementById('loginBox').style.display = target === 'login' ? 'block' : 'none';
            document.getElementById('regBox').style.display = target === 'reg' ? 'block' : 'none';
            const visibleInputs = document.querySelectorAll(`.auth-card:not([style*="display: none"]) .nav-input`);
            if(visibleInputs.length > 0) visibleInputs[0].focus();
        }

        function buildFingerprint() {
            return btoa(navigator.userAgent + screen.width).substring(0, 25);
        }

        // ======================= تسجيل الدخول وإدارة الحساب الثابت للأدمن =======================
        async function handleLogin() {
            const userInp = document.getElementById('loginUser').value.trim();
            const passInp = document.getElementById('loginPass').value;

            if (!userInp || !passInp) return showCenterAlert('تنبيه ناقص', 'الرجاء ملء حقول الدخول المعتمدة لاستمرار عملك.', 'warning');

            // حساب الأدمن ثابت ومحمي كلياً
            if (userInp === 'admin12344321@1x' && passInp === 'admin12344321@1x') {
                sessionUser = { uid: 'SUPER_ADMIN', fullName: 'الأستاذ أيمن الرفاعي', firstName: 'أيمن', phone: 'الإدارة العامة للمنصة', role: 'admin' };
                localStorage.setItem('refaiSession', JSON.stringify(sessionUser));
                initSession();
                return;
            }

            try {
                let snap = await db.collection('users').where('email', '==', userInp).get();
                if (snap.empty) snap = await db.collection('users').where('phone', '==', userInp).get();
                if (snap.empty) return showCenterAlert('خطأ في البيانات', 'البيانات المدخلة غير مسجلة حالياً بملفات المنصة.', 'error');

                const docRef = snap.docs[0];
                const data = docRef.data();

                if (data.password !== passInp) return showCenterAlert('خطأ في الدخول', 'كلمة المرور المكتوبة غير متطابقة مع هذا الحساب.', 'error');
                if (data.blocked) return showCenterAlert('حساب مقفل', 'عذراً! تم حظر هذا الحساب لمخالفته شروط الأمان ومشاركة البيانات.', 'error');

                const print = buildFingerprint();
                if (data.deviceFingerprint && data.deviceFingerprint !== print && data.role !== 'admin') {
                    await db.collection('users').doc(docRef.id).update({ blocked: true, securityAlert: "تغيير البصمة الحصرية المعتمدة" });
                    return showCenterAlert('🔴 حماية صارمة', 'تم إغلاق الحساب فوراً لحمايته بسبب رصد تغيير في جهاز الطالب الأصلي.', 'error');
                }

                await db.collection('users').doc(docRef.id).update({ deviceFingerprint: print, lastLogin: firebase.firestore.FieldValue.serverTimestamp() });
                sessionUser = { uid: docRef.id, ...data, deviceFingerprint: print };
                localStorage.setItem('refaiSession', JSON.stringify(sessionUser));
                initSession();
            } catch (err) { showCenterAlert('خطأ في السيرفر', err.message, 'error'); }
        }

        // ======================= توثيق الطالب الجديد ومنع أخطاء الضغط المكرر =======================
        async function handleRegister() {
            const first = document.getElementById('rFirst').value.trim();
            const father = document.getElementById('rFather').value.trim();
            const grand = document.getElementById('rGrand').value.trim();
            const family = document.getElementById('rFamily').value.trim();
            const phone = document.getElementById('rCountry').value + document.getElementById('rPhone').value.trim();
            const email = document.getElementById('rEmail').value.trim();
            const city = document.getElementById('rCity').value.trim();
            const pass = document.getElementById('rPass').value;

            if(!first || !phone || !email || !pass) return showCenterAlert('حقول ناقصة', 'يرجى إكمال الحقول الأساسية لتوثيق هوية الطالب.', 'warning');

            try {
                // الفحص الدقيق والمحكم لمنع التكرار نهائياً
                const checkEmail = await db.collection('users').where('email', '==', email).get();
                if(!checkEmail.empty) return showCenterAlert('مسجل مسبقاً', 'هذا البريد الإلكتروني مستخدم بالفعل في منصة أخرى لدينا.', 'warning');
                
                const checkPhone = await db.collection('users').where('phone', '==', phone).get();
                if(!checkPhone.empty) return showCenterAlert('الرقم مكرر', 'رقم الهاتف هذا مفعّل بحساب طالب آخر حالياً.', 'warning');

                const print = buildFingerprint();
                const newUser = {
                    firstName: first, 
                    fullName: `${first} ${father} ${grand} ${family}`, 
                    email: email, 
                    phone: phone,
                    city: city, 
                    password: pass, 
                    role: 'user', 
                    deviceFingerprint: print, 
                    blocked: false, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                const docRef = await db.collection('users').add(newUser);
                sessionUser = { uid: docRef.id, ...newUser };
                localStorage.setItem('refaiSession', JSON.stringify(sessionUser));
                
                showCenterAlert('تم التوثيق بنجاح', `أهلاً بك يا ${first}، تم إنشاء ملفك التعليمي والدخول للمنصة فوراً!`, 'success', () => {
                    initSession();
                });
            } catch(e) { showCenterAlert('خطأ سيرفر', e.message, 'error'); }
        }

        function userLogout() { localStorage.removeItem('refaiSession'); location.reload(); }

        function initSession() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            document.getElementById('userInitial').textContent = sessionUser.firstName ? sessionUser.firstName.charAt(0) : 'أ';
            document.getElementById('uNameDisplay').textContent = sessionUser.fullName;
            document.getElementById('uRoleDisplay').textContent = sessionUser.role === 'admin' ? 'الإدارة العامة' : 'طالب رسمي';
            if(sessionUser.role === 'admin') document.getElementById('navAdmin').style.display = 'block';
            startRealtimeListeners();
            changePage('home');
        }

        // ======================= البث الحي الفوري للمحاضرات لضمان الاستقرار التام =======================
        function startRealtimeListeners() {
            db.collection('videos').onSnapshot(snap => {
                globalVideos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // فرز وحل اختفاء المحاضرات
                globalVideos.sort((a, b) => {
                    const timeA = a.createdAt ? (a.createdAt.toMillis ? a.createdAt.toMillis() : a.createdAt) : Date.now();
                    const timeB = b.createdAt ? (b.createdAt.toMillis ? b.createdAt.toMillis() : b.createdAt) : Date.now();
                    return timeB - timeA;
                });

                if(sessionUser.role === 'admin') userUnlockedIds = globalVideos.map(v => v.id);
                refreshCurrentView();
            });

            if(sessionUser.role !== 'admin') {
                db.collection('activations').where('userId', '==', sessionUser.uid).onSnapshot(snap => {
                    userUnlockedIds = snap.docs.map(doc => doc.data().videoId);
                    refreshCurrentView();
                });
            }
        }

        function refreshCurrentView() {
            if(currentActiveView === 'home') buildHomeView();
            else if(currentActiveView === 'mylessons') buildMyLessonsView();
            else if(currentActiveView === 'admin') buildAdminDashboard();
        }

        function changePage(target) {
            currentActiveView = target;
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            if(target === 'home') { document.getElementById('navHome').classList.add('active'); buildHomeView(); }
            else if(target === 'mylessons') { document.getElementById('navMyLessons').classList.add('active'); buildMyLessonsView(); }
            else if(target === 'admin') { document.getElementById('navAdmin').classList.add('active'); buildAdminDashboard(); }
        }

        function buildHomeView() {
            document.getElementById('pageContent').innerHTML = `<h2 style="margin-bottom:25px; font-weight:900;">📚 أرشيف المحاضرات الشامل</h2><div class="lessons-grid" id="mainGrid"></div>`;
            renderCards(globalVideos, 'mainGrid');
        }

        function buildMyLessonsView() {
            const list = globalVideos.filter(v => userUnlockedIds.includes(v.id));
            document.getElementById('pageContent').innerHTML = `<h2 style="margin-bottom:25px; font-weight:900;">🎥 محاضراتي المفتوحة للدراسة (${list.length})</h2><div class="lessons-grid" id="myGrid"></div>`;
            if(list.length === 0) document.getElementById('myGrid').innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:50px;">لا توجد محاضرات مفعلة بحسابك حتى الآن.</p>`;
            else renderCards(list, 'myGrid');
        }

        function renderCards(list, elementId) {
            const target = document.getElementById(elementId);
            if(!target) return; target.innerHTML = '';
            list.forEach(v => {
                const opened = userUnlockedIds.includes(v.id);
                const el = document.createElement('div');
                el.className = 'lesson-card';
                el.innerHTML = `
                    <div class="thumb"><i class="fas ${opened ? 'fa-play-circle' : 'fa-lock'}" style="${opened ? 'color:var(--accent)' : 'color:var(--danger)'}"></i></div>
                    <div class="info">
                        <div class="title">${v.title}</div>
                        <div class="meta"><span><i class="far fa-clock"></i> بث مشفر</span><span class="badge ${opened ? 'badge-active' : 'badge-lock'}">${opened ? 'جاهز للمشاهدة' : 'يتطلب كود'}</span></div>
                    </div>
                `;
                el.onclick = () => { if(opened) launchSecureStream(v); else displayActivationModal(v); };
                target.appendChild(el);
            });
        }

        function triggerSearch() {
            const q = document.getElementById('searchBar').value.toLowerCase().trim();
            const fil = globalVideos.filter(v => v.title.toLowerCase().includes(q));
            renderCards(fil, currentActiveView === 'home' ? 'mainGrid' : 'myGrid');
        }

        function displayActivationModal(video) {
            const overlay = document.createElement('div');
            overlay.className = 'center-popup-overlay';
            overlay.innerHTML = `
                <div class="center-popup" style="max-width:500px;">
                    <div class="icon-box icon-warning"><i class="fas fa-key"></i></div>
                    <h4>تفعيل المحاضرة المحمية</h4>
                    <p style="margin-bottom:15px;">الرجاء تزويد المنصة بكود الحصيرة الخاص بدرس:<br><b>${video.title}</b></p>
                    <input type="text" id="cdInp" placeholder="اكتب كودك بدقة هنا..." style="text-transform:uppercase; text-align:center; letter-spacing:2px; font-weight:bold;">
                    <button class="btn btn-primary" style="width:100%; margin-top:10px;" id="actBtn">تأكيد شحن وتفعيل الكود</button>
                    <button class="btn btn-outline btn-sm" style="width:100%; margin-top:8px; border:none;" onclick="this.parentElement.parentElement.remove()">إلغاء الأمر</button>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('#cdInp').focus();

            overlay.querySelector('#actBtn').onclick = async () => {
                const code = overlay.querySelector('#cdInp').value.trim().toUpperCase();
                if(!code) return showCenterAlert('حقل فارغ', 'الرجاء إدخال الكود أولاً ليتمكن النظام من فحصه.', 'warning');
                try {
                    const snap = await db.collection('videos').doc(video.id).collection('codes').where('code', '==', code).limit(1).get();
                    if(snap.empty) return showCenterAlert('كود خاطئ', 'عذراً! هذا الكود غير موجود أو ربما يخص محاضرة أخرى.', 'error');
                    
                    const cDoc = snap.docs[0];
                    if(cDoc.data().usedBy) return showCenterAlert('مستعمل مسبقاً', 'تم استخدام هذا الكود سابقاً من قِبل طالب آخر، الأكواد صالحة لجهاز واحد فقط.', 'error');

                    await db.collection('videos').doc(video.id).collection('codes').doc(cDoc.id).update({
                        usedBy: sessionUser.uid, usedByName: sessionUser.fullName, usedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await db.collection('activations').add({ userId: sessionUser.uid, videoId: video.id, code: code });
                    overlay.remove();
                    showCenterAlert('تم التفعيل الفوري', 'مبروك! تم فتح الدرس بحسابك بنجاح وسرعة كاملة.', 'success');
                } catch(e) { showCenterAlert('خطأ', e.message, 'error'); }
            };
        }

        function launchSecureStream(video) {
            const p = document.createElement('div');
            p.className = 'video-player-overlay';
            
            let playerHtml = '';
            if(video.type === 'embed') {
                playerHtml = `<iframe src="${video.storageURL}" allowfullscreen allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin"></iframe>`;
            } else {
                playerHtml = `<video src="${video.storageURL}" controls autoplay controlsList="nodownload" disablePictureInPicture></video>`;
            }

            p.innerHTML = `
                <div style="position:absolute; top:25px; left:25px; z-index:4200;"><button class="btn btn-danger btn-sm" onclick="clearInterval(window.wmInterval); this.parentElement.parentElement.remove()"><i class="fas fa-times"></i> إنهاء وإغلاق الدرس</button></div>
                <div class="video-wrap">
                    ${playerHtml}
                    <div class="video-watermark" id="vWm">المشاهدة مخصصة لـ: ${sessionUser.fullName} | ${sessionUser.phone}</div>
                </div>
            `;
            document.body.appendChild(p);

            window.wmInterval = setInterval(() => {
                const el = document.getElementById('vWm'); 
                if(!el) return;
                if(!el.classList.contains('hint-center')) {
                    el.classList.add('hint-center');
                    setTimeout(() => { if(el) el.classList.remove('hint-center'); }, 4500);
                }
            }, 14000);
        }

        // ======================= واجهة الإمبراطور الإدارية المتطورة =======================
        async function buildAdminDashboard() {
            document.getElementById('pageContent').innerHTML = `
                <h2 style="font-weight:900; margin-bottom:25px;"><i class="fas fa-crown" style="color:var(--accent)"></i> التحكم الإداري العام والرقابة الأمنية</h2>
                
                <div class="stats-row">
                    <div class="stat-card">المحاضرات الفعالة<h3 id="stVid">0</h3></div>
                    <div class="stat-card">الطلاب المسجلين ببياناتهم<h3 id="stUsers">0</h3></div>
                    <div class="stat-card">الطلاب تحت الحظر والأمان<h3 id="stBlocks">0</h3></div>
                </div>

                <div style="margin-bottom: 30px;">
                     <button class="btn btn-danger" onclick="adminResetAllDevices()"><i class="fas fa-sync-alt"></i> تصفير أجهزة كافة الطلاب (للسماح لهم بتبديل الموبايلات)</button>
                </div>

                <div class="admin-sections">
                    <div class="admin-block">
                        <h3><i class="fas fa-upload"></i> رفع وإطلاق المحاضرات الفورية لجميع المشتركين</h3>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                            <input type="text" id="admTitle" placeholder="اكتب اسم أو عنوان الدرس">
                            <select id="admType" onchange="toggleUploadTypeHint()">
                                <option value="direct">رابط فيديو مباشر عالي السرعة (MP4)</option>
                                <option value="embed">تضمين كود خارجي (Vimeo / YouTube / Bunny)</option>
                            </select>
                        </div>
                        <input type="url" id="admUrl" placeholder="أدخل هنا الرابط المباشر للملف...">
                        <button class="btn btn-primary" onclick="adminPublishVideo()"><i class="fas fa-paper-plane"></i> نشر وإتاحة فورية بالموقع</button>

                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead><tr><th>اسم المحاضرة المرفوعة</th><th>النوع</th><th>تتبع الأكواد</th><th>حذف البيانات</th></tr></thead>
                                <tbody id="admVidTable"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="admin-block" id="codesSectionBlock" style="display:none; border-color:var(--accent);">
                        <h3><i class="fas fa-key"></i> إدارة وفحص الأكواد الحية لدرس: <span id="targetCodeTitle" style="color:white;"></span></h3>
                        <div style="display:flex; gap:12px; margin-bottom:20px;">
                            <button class="btn btn-primary btn-sm" onclick="adminGenerateMassCodes()">⚙️ توليد 50 كود عشوائي محمي</button>
                            <button class="btn btn-outline btn-sm" onclick="adminGenerateCustomCode()">✏️ إنشاء كود باسم طالب مخصص</button>
                        </div>
                        <div class="live-codes-container" id="admCodesGrid"></div>
                    </div>

                    <div class="admin-block">
                        <h3><i class="fas fa-users"></i> قاعدة بيانات وإداريات حسابات الطلاب</h3>
                        <div class="table-responsive">
                            <table class="admin-table">
                                <thead><tr><th>اسم الطالب والبريد الإلكتروني</th><th>رقم الهاتف الحقيقي</th><th>تعديل فوري للرمز</th><th>حالة الحساب</th><th>اتخاذ إجراء</th></tr></thead>
                                <tbody id="admUsersTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            loadAdminDataRealtime();
        }

        function toggleUploadTypeHint() {
            const type = document.getElementById('admType').value;
            const inp = document.getElementById('admUrl');
            if(type === 'embed') inp.placeholder = "ضع رابط الـ Embed (مثال: https://www.youtube.com/embed/xxxxxx)";
            else inp.placeholder = "ضع رابط الملف المباشر (ينتهي بـ .mp4)";
        }

        function loadAdminDataRealtime() {
            document.getElementById('stVid').textContent = globalVideos.length;
            
            const vTable = document.getElementById('admVidTable'); vTable.innerHTML = '';
            globalVideos.forEach(v => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${v.title}</b></td>
                    <td><span class="badge badge-active">${v.type || 'direct'}</span></td>
                    <td>
                        <button class="btn btn-outline btn-sm" style="color:var(--accent); border-color:var(--accent);" onclick="selectVideoForCodesTracking('${v.id}','${v.title}')"><i class="fas fa-eye"></i> تتبع الأكواد</button>
                    </td>
                    <td><button class="btn btn-danger btn-sm" onclick="adminDeleteVideo('${v.id}')">مسح المحاضرة</button></td>
                `;
                vTable.appendChild(tr);
            });

            db.collection('users').orderBy('createdAt','desc').onSnapshot(snap => {
                document.getElementById('stUsers').textContent = snap.size;
                const uTable = document.getElementById('admUsersTable'); uTable.innerHTML = '';
                let blockCount = 0;

                snap.forEach(doc => {
                    const u = doc.data();
                    if(u.role === 'admin') return;
                    if(u.blocked) blockCount++;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><b>${u.fullName}</b><br><small style="color:var(--text-secondary);">${u.email}</small></td>
                        <td><code>${u.phone}</code></td>
                        <td>
                            <input type="text" value="${u.password}" style="width:110px; padding:6px 12px; margin:0; border-radius:10px;" onchange="adminUpdateUserPassword('${doc.id}', this.value)">
                        </td>
                        <td>${u.blocked ? '<span class="badge badge-lock">محظور مقفل</span>' : '<span class="badge badge-active">نشط آمن</span>'}</td>
                        <td>
                            ${u.blocked ? `<button class="btn btn-primary btn-sm" onclick="toggleUserStatus('${doc.id}', false)">🔓 إلغاء الحظر</button>` : 
                            `<button class="btn btn-danger btn-sm" onclick="toggleUserStatus('${doc.id}', true)">⛔ قفل وحظر</button>`}
                        </td>
                    `;
                    uTable.appendChild(tr);
                });
                document.getElementById('stBlocks').textContent = blockCount;
            });
        }

        async function adminPublishVideo() {
            const title = document.getElementById('admTitle').value.trim();
            const type = document.getElementById('admType').value;
            const url = document.getElementById('admUrl').value.trim();

            if(!title || !url) return showCenterAlert('بيانات ناقصة', 'الرجاء إدخال اسم المحاضرة مع الرابط لتثبيتها بالسيرفر.', 'warning');

            try {
                await db.collection('videos').add({
                    title: title, 
                    type: type, 
                    storageURL: url, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('admTitle').value = '';
                document.getElementById('admUrl').value = '';
                showCenterAlert('تم النشر', 'تم بث المحاضرة بنجاح تام بالموقع دون أدنى مشكلة.', 'success');
            } catch(e) { showCenterAlert('خطأ رفيع', e.message, 'error'); }
        }

        async function adminDeleteVideo(id) {
            if(confirm('هل تود بالتأكيد التام مسح درس المحاضرة نهائياً من أرشيف الطلاب؟')) {
                await db.collection('videos').doc(id).delete();
                showCenterAlert('تم المسح', 'تم حذف المحاضرة وملفاتها بنجاح كلي.', 'success');
                document.getElementById('codesSectionBlock').style.display = 'none';
            }
        }

        async function toggleUserStatus(id, isBlock) {
            await db.collection('users').doc(id).update({ blocked: isBlock, deviceFingerprint: isBlock ? "blocked" : "" });
            showCenterAlert('حالة الحساب', 'تم تطبيق تحديث حظر وقفل الحساب على السيرفر بنجاح.', 'success');
        }

        async function adminUpdateUserPassword(id, newPass) {
            if(!newPass.trim()) return showCenterAlert('خطأ رمز', 'لا يمكن جعل كلمة المرور الخاصة بالطالب فارغة.', 'warning');
            await db.collection('users').doc(id).update({ password: newPass.trim() });
            showCenterAlert('تم التغيير', 'تم تغيير كلمة مرور حساب الطالب بنجاح ومزامنتها فوياً.', 'success');
        }

        async function adminResetAllDevices() {
            if(confirm('هل أنت متأكد من مسح وإعادة تصفير بصمة أجهزة كل الطلاب حالياً بالمنصة؟')) {
                try {
                    const snap = await db.collection('users').where('role', '==', 'user').get();
                    const batch = db.batch();
                    snap.forEach(doc => { batch.update(db.collection('users').doc(doc.id), { deviceFingerprint: "" }); });
                    await batch.commit();
                    showCenterAlert('اكتمل التصفير', 'تم تصفير وبدء حماية كافة أجهزة الطلاب بنجاح مطلق!', 'success');
                } catch(e) { showCenterAlert('خطأ سيرفر', e.message, 'error'); }
            }
        }

        function selectVideoForCodesTracking(id, title) {
            adminSelectedVideoIdForCodes = id; 
            document.getElementById('codesSectionBlock').style.display = 'block';
            document.getElementById('targetCodeTitle').textContent = title;

            db.collection('videos').doc(id).collection('codes').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const grid = document.getElementById('admCodesGrid'); grid.innerHTML = '';
                if(snap.empty) { grid.innerHTML = '<p style="color:var(--text-secondary); padding:10px;">لا يوجد أكواد مخصصة لهذه المادة حالياً.</p>'; return; }

                snap.forEach(doc => {
                    const c = doc.data();
                    const d = document.createElement('div');
                    if(c.usedBy) {
                        d.className = 'live-code-badge code-used-up';
                        d.innerHTML = `${c.code}<br><small style="font-size:0.65rem; display:block; text-overflow:ellipsis; overflow:hidden;">${c.usedByName}</small>`;
                    } else {
                        d.className = 'live-code-badge code-avail';
                        d.innerHTML = `${c.code}`;
                    }
                    grid.appendChild(d);
                });
            });
        }

        async function adminGenerateMassCodes() {
            if(!adminSelectedVideoIdForCodes) return;
            const batch = db.batch();
            const ref = db.collection('videos').doc(adminSelectedVideoIdForCodes).collection('codes');
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            
            for(let i=0; i<50; i++) {
                let code = ''; for(let c=0; c<8; c++) code += chars.charAt(Math.floor(Math.random() * chars.length));
                batch.set(ref.doc(), { code: code, usedBy: null, usedByName: null, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            }
            await batch.commit(); 
            showCenterAlert('توليد ناجح', 'تم توليد ورفع 50 كود شحن حماية جديدة بنجاح تام للمحاضرة.', 'success');
        }

        async function adminGenerateCustomCode() {
            if(!adminSelectedVideoIdForCodes) return;
            const text = prompt('اكتب نص أو اسم كود التفعيل المخصص الذي تريده:');
            if(!text) return;
            const formatted = text.trim().toUpperCase();

            await db.collection('videos').doc(adminSelectedVideoIdForCodes).collection('codes').add({
                code: formatted, usedBy: null, usedByName: null, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showCenterAlert('كود مخصص جديد', `تم إطلاق كود خاص بنجاح بالمستندات باسم: ${formatted}`, 'success');
        }

        // تشغيل المنصة والتحقق من حفظ الحسابات وجلسات الكاش بالجهاز فورياً
        window.addEventListener('DOMContentLoaded', () => {
            setupKeyboardEngine();
            const cached = localStorage.getItem('refaiSession');
            if(cached) { sessionUser = JSON.parse(cached); initSession(); }
            else { document.getElementById('authPage').style.display = 'flex'; switchAuth('login'); }

            db.collection('settings').doc('site').onSnapshot(snap => {
                if(snap.exists && snap.data().whatsappLink) document.getElementById('waLink').href = snap.data().whatsappLink;
                else document.getElementById('waLink').href = "https://wa.me/963930000000";
            });
        });
    </script>
